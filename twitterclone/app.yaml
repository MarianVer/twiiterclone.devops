# 1. Опис бази даних (Змінюємо юзера на django_user)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
spec:
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
      - name: postgres
        image: postgres:15
        env:
        - name: POSTGRES_DB
          value: "postgres"
        - name: POSTGRES_USER
          value: "django_user"      # ТУТ ЗМІНИЛИ
        - name: POSTGRES_PASSWORD
          value: "postgres"
---
# 2. Сервіс для бази (без змін)
apiVersion: v1
kind: Service
metadata:
  name: db
spec:
  selector:
    app: db
  ports:
    - port: 5432
      targetPort: 5432
---
# 3. Твоя аплікація (Змінюємо порт на 8000)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: twiiter-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: twiiter
  template:
    metadata:
      labels:
        app: twiiter
    spec:
      containers:
      - name: twiiter-container
        image: twiiterclone:local
        imagePullPolicy: Never
        ports:
        - containerPort: 8000     # ТУТ ЗМІНИЛИ (було 8080)
---
# 4. Сервіс для твоєї аплікації (Змінюємо targetPort на 8000)
apiVersion: v1
kind: Service
metadata:
  name: twiiter-service
spec:
  selector:
    app: twiiter
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000           # ТУТ ЗМІНИЛИ (було 8080)
  type: NodePort
