# 1. База даних (PostgreSQL)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
spec:
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
      - name: postgres
        image: postgres:15
        env:
        - name: POSTGRES_DB
          value: "twitterclone"      # Згідно з settings.py
        - name: POSTGRES_USER
          value: "django_user"       # Згідно з settings.py
        - name: POSTGRES_PASSWORD
          value: "yourpassword"      # Згідно з settings.py
---
# 2. Сервіс для бази
apiVersion: v1
kind: Service
metadata:
  name: db
spec:
  selector:
    app: db
  ports:
    - port: 5432
      targetPort: 5432
---
# 3. Твоя Django-аплікація
apiVersion: apps/v1
kind: Deployment
metadata:
  name: twiiter-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: twiiter
  template:
    metadata:
      labels:
        app: twiiter
    spec:
      containers:
      - name: twiiter-container
        image: twiiterclone:local
        imagePullPolicy: Never
        ports:
        - containerPort: 8000        # Django зазвичай на 8000
---
# 4. Сервіс для аплікації
apiVersion: v1
kind: Service
metadata:
  name: twiiter-service
spec:
  selector:
    app: twiiter
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000              # Перенаправляємо на 8000
  type: NodePort
