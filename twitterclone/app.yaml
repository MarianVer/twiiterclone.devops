# 1. База даних
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
spec:
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
      - name: postgres
        image: postgres:15
        env:
        - name: POSTGRES_DB
          value: "postgres"
        - name: POSTGRES_USER
          value: "django_user"
        - name: POSTGRES_PASSWORD
          value: "postgres" # Спробуй спочатку "postgres", якщо не вийде - "password"
---
apiVersion: v1
kind: Service
metadata:
  name: db
spec:
  selector:
    app: db
  ports:
    - port: 5432
      targetPort: 5432
---
# 3. Твоя аплікація
apiVersion: apps/v1
kind: Deployment
metadata:
  name: twiiter-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: twiiter
  template:
    metadata:
      labels:
        app: twiiter
    spec:
      containers:
      - name: twiiter-container
        image: twiiterclone:local
        imagePullPolicy: Never
        env:
        - name: DATABASE_URL # Багато Django-проєктів використовують цей формат
          value: "postgres://django_user:postgres@db:5432/postgres"
        - name: POSTGRES_PASSWORD # Або окремі змінні
          value: "postgres"
        - name: POSTGRES_USER
          value: "django_user"
        - name: POSTGRES_DB
          value: "postgres"
        ports:
        - containerPort: 8000
---
# 4. Сервіс (targetPort МАЄ бути 8000)
apiVersion: v1
kind: Service
metadata:
  name: twiiter-service
spec:
  selector:
    app: twiiter
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: NodePort
